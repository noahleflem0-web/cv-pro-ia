<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV Pro IA — Générateur de CV & Lettres</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: #888; font-size: 14px; margin-bottom: 24px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .tab { padding: 8px 18px; border-radius: 99px; border: 2px solid #e0e0e0;
           background: transparent; font-size: 14px; cursor: pointer; transition: all .15s; }
    .tab.active { background: #7F77DD; border-color: #7F77DD; color: #fff; font-weight: 600; }
    .card { background: #fff; border-radius: 14px; border: 1.5px solid #ebebeb; padding: 1.2rem; }
    label { display: block; font-size: 12px; font-weight: 600; color: #888;
            text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    input, textarea { width: 100%; padding: 9px 12px; border-radius: 8px;
                      border: 1.5px solid #e0e0e0; font-size: 14px; font-family: inherit;
                      margin-bottom: 12px; outline: none; }
    textarea { min-height: 80px; resize: vertical; }
    .btn { width: 100%; padding: 12px; border-radius: 10px; border: none;
           background: #7F77DD; color: #fff; font-size: 15px; font-weight: 600;
           cursor: pointer; margin-top: 4px; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .result { margin-top: 16px; background: #fafafa; border-radius: 10px;
              border: 1.5px solid #7F77DD44; padding: 1rem; white-space: pre-wrap;
              font-size: 13px; line-height: 1.7; max-height: 400px; overflow-y: auto; }
    .copy-btn { float: right; font-size: 12px; padding: 4px 10px; border-radius: 6px;
                border: 1px solid #7F77DD; background: transparent; color: #7F77DD; cursor: pointer; }
    .tone-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .tone { padding: 5px 12px; border-radius: 99px; border: 1.5px solid #ccc;
            background: transparent; font-size: 12px; cursor: pointer; }
    .tone.active { background: #7F77DD; border-color: #7F77DD; color: #fff; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const TABS = ["CV","Lettre","Email","LinkedIn"];
const TONES = ["Professionnel","Dynamique","Créatif"];
const API_KEY = "const res = await fetch("/api/generate", { ... })"; // ⚠️ À remplacer

function App() {
  const [tab, setTab] = useState("CV");
  const [tone, setTone] = useState("Professionnel");
  const [nom, setNom] = useState("");
  const [poste, setPoste] = useState("");
  const [detail, setDetail] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState("");

  const prompts = {
    CV: `Génère un CV pro en français. Ton: ${tone}. Nom: ${nom}. Poste: ${poste}. Détails: ${detail}. Sections: Profil, Expérience, Compétences, Formation.`,
    Lettre: `Rédige une lettre de motivation. Ton: ${tone}. Candidat: ${nom}. Poste: ${poste}. Arguments: ${detail}. 3 paragraphes: accroche, argumentation, conclusion.`,
    Email: `Rédige un email de candidature court (max 150 mots). Ton: ${tone}. Nom: ${nom}. Poste: ${poste}. Message: ${detail}. Inclure l'objet.`,
    LinkedIn: `Rédige un résumé LinkedIn. Ton: ${tone}. Nom: ${nom}. Poste: ${poste}. Valeur: ${detail}. 3 paragraphes + appel à l'action.`
  };

  const generate = async () => {
    setLoading(true); setResult("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": API_KEY, "anthropic-version": "2023-06-01" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000,
          messages: [{ role: "user", content: prompts[tab] }] })
      });
      const data = await res.json();
      setResult(data.content?.[0]?.text || "Erreur");
    } catch { setResult("Erreur de connexion"); }
    setLoading(false);
  };

  return (
    <div className="container">
      <h1>✨ CV Pro IA</h1>
      <p className="sub">Génère ton CV, lettre et profil en quelques secondes</p>
      <div className="tabs">
        {TABS.map(t => <button key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>{setTab(t);setResult("")}}>{t}</button>)}
      </div>
      <div className="card">
        <label>Ton</label>
        <div className="tone-row">
          {TONES.map(t => <button key={t} className={`tone ${tone===t?"active":""}`} onClick={()=>setTone(t)}>{t}</button>)}
        </div>
        <label>Nom complet</label>
        <input placeholder="ex : Marie Dupont" value={nom} onChange={e=>setNom(e.target.value)} />
        <label>Poste visé</label>
        <input placeholder="ex : Développeuse React" value={poste} onChange={e=>setPoste(e.target.value)} />
        <label>Expériences / motivations / compétences</label>
        <textarea placeholder="Décris ton parcours, tes compétences, ta valeur ajoutée…" value={detail} onChange={e=>setDetail(e.target.value)} />
        <button className="btn" onClick={generate} disabled={loading}>
          {loading ? "⏳ Génération…" : "✨ Générer"}
        </button>
        {result && <div className="result">
          <button className="copy-btn" onClick={()=>navigator.clipboard.writeText(result)}>📋 Copier</button>
          {result}
        </div>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
